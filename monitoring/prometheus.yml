global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Ship all scraped metrics to Amazon Managed Service for Prometheus.
# Replace the url value with the output of:
#   terraform output -raw amp_remote_write_url
# The EC2 instance profile must have the policy from:
#   terraform output -raw ec2_remote_write_policy_arn
remote_write:
  - url: https://aps-workspaces.us-east-1.amazonaws.com/workspaces/REPLACE_WITH_WORKSPACE_ID/api/v1/remote_write
    sigv4:
      region: us-east-1
    queue_config:
      max_samples_per_send: 1000
      max_shards: 200
      capacity: 2500

scrape_configs:
  - job_name: 'techstream_flask'
    ec2_sd_configs:
      - region: us-east-1
        port: 8000
        filters:
          - name: tag:Role
            values: [TechStream-App]
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__meta_ec2_instance_id]
        target_label: instance_id
      - source_labels: [__meta_ec2_availability_zone]
        target_label: availability_zone
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance_name
      - source_labels: [__meta_ec2_private_ip]
        target_label: private_ip
